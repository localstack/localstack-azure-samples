name: Samples CI

# Theory of Operation:
# This workflow automates the testing of Azure sample applications against the LocalStack Azure emulator.
# It follows the best practices from the localstack-pro repository:
# 1. Parallel Testing: Splits the sample suite into shards to reduce execution time.
# 2. Standardized Tooling: Uses a Makefile for environment setup and test orchestration.
# 3. Cloud Emulation: Configures the Azure CLI to target the LocalStack emulator.

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scripts:
    name: "Run Test Scripts (amd64) — Part ${{ matrix.shard }} of ${{ matrix.splits }}"
    environment: AZURE
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        splits: [2]
    runs-on: ubuntu-latest
    
    env:
      LOCALSTACK_AUTH_TOKEN: ${{ secrets.TEST_LOCALSTACK_AUTH_TOKEN }}
      DOCKER_FLAGS: "-e MSSQL_ACCEPT_EULA=Y"
      PERMIT_ALL_CERTIFICATES: "true"
      AZURE_CLI_DISABLE_CONNECTION_VERIFICATION: "1"
      DNS_ADDRESS: "0"
      LOCALSTACK_HOSTNAME: "127.0.0.1"
      EDGE_PORT: "4566"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_PULL_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_PULL_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

      - name: Free up disk space
        run: |
          docker system prune -af --volumes
          docker builder prune -af

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unixodbc-dev libsnappy-dev

      - name: Install test dependencies
        run: make install

      - name: Install Bicep
        run: az bicep install

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install MSSQL ODBC and Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Start LocalStack
        run: |
          IMAGE_NAME=localstack/localstack-azure-alpha localstack start -d
          localstack wait -t 60

      - name: Register LocalStack Cloud
        run: |
          az cloud register -n LocalStack \
            --endpoint-resource-manager "http://127.0.0.1:4566" \
            --suffix-storage-endpoint "localhost.localstack.cloud" \
            --suffix-keyvault-dns ".localhost.localstack.cloud" \
            --endpoint-active-directory "http://127.0.0.1:4566" \
            --endpoint-gallery "http://127.0.0.1:4566" \
            --endpoint-management "http://127.0.0.1:4566" || true
          
          az cloud set -n LocalStack
          az login --service-principal -u "ignored" -p "ignored" --tenant "ignored" --allow-no-subscriptions || true

      - name: Run Test Scripts
        run: make test SHARD=${{ matrix.shard }} SPLITS=${{ matrix.splits }}

      - name: Get LocalStack Logs
        if: always()
        run: make logs
